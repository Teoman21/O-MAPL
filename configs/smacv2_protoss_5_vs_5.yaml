# SMACv2 protoss_5_vs_5 — template config.
#
# This trains O-MAPL on a SMACv2 preference dataset. To use it:
#   1. Obtain the ComaDICE SMACv2 offline dataset for this task and convert it
#      with omapl.data.omiga_adapter.trajectories_from_arrays.
#   2. Generate preference labels with omapl.data.generate_preferences
#      (rule-based across poor/medium/expert, or LLM-based via GPT-4o), and save
#      a PreferenceDataset to data/smacv2_protoss_5_vs_5.pkl.
#   3. Install smacv2 + StarCraft II for evaluation (omapl/envs/smac_wrapper.py).
#
# n_agents / obs_dim / state_dim / action_dim are auto-filled from the dataset.
algo: omapl
env: smacv2
task: protoss_5_vs_5
data_path: data/smacv2_protoss_5_vs_5.pkl
seed: 0
device: cuda

lr: 1.0e-4
tau: 0.005
gamma: 0.99
batch_size: 32          # number of preference pairs (2000 pairs total per Table 3)
agent_hidden_dim: 256
mixer_hidden_dim: 64
n_train_steps: 100000

beta: 1.0               # MaxEnt temperature (not specified in paper; tune)
reg_coef: 1.0
param_sharing: true
use_agent_id: true
mixer_q_use_action: true

eval_every: 1000
eval_episodes: 32
